<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pixgbc</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Game Boy Color image converter</p>
        <h1>Local pixel lab</h1>
        <p class="lede">Single-image relaxed-mode preview. CLI + web share the same render path.</p>
      </section>

      <section class="panel controls">
        <label class="field">
          <span>Image</span>
          <input id="file" type="file" accept="image/png,image/jpeg,image/gif">
        </label>

        <label class="field">
          <span>Palette</span>
          <select id="palette"></select>
        </label>

        <label class="field">
          <span>Mode</span>
          <select id="mode">
            <option value="relaxed">relaxed</option>
            <option value="cgb-bg">cgb-bg</option>
          </select>
        </label>

        <button id="render">Render</button>
        <p id="status" class="status"></p>
      </section>

      <section class="panel result">
        <img id="preview" alt="Rendered output preview">
        <p id="links" class="links"></p>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
