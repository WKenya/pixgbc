<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pixgbc</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Game Boy Color image converter</p>
        <h1>Local pixel lab</h1>
        <p class="lede">Single-image relaxed-mode preview. CLI + web share the same render path.</p>
      </section>

      <section class="panel controls">
        <label class="field">
          <span>Image</span>
          <input id="file" type="file" accept="image/png,image/jpeg,image/gif">
        </label>

        <label class="field">
          <span>Token</span>
          <input id="token" type="password" placeholder="optional access token">
        </label>

        <label class="field">
          <span>Palette Mode</span>
          <select id="palette-mode">
            <option value="preset">preset</option>
            <option value="extract">extract</option>
          </select>
        </label>

        <label class="field">
          <span>Palette</span>
          <select id="palette"></select>
        </label>

        <label class="field">
          <span>Mode</span>
          <select id="mode">
            <option value="relaxed">relaxed</option>
            <option value="cgb-bg">cgb-bg</option>
          </select>
        </label>

        <label class="field">
          <span>Width</span>
          <input id="width" type="number" min="1" value="160">
        </label>

        <label class="field">
          <span>Height</span>
          <input id="height" type="number" min="1" value="144">
        </label>

        <label class="field">
          <span>Crop</span>
          <select id="crop">
            <option value="fill">fill</option>
            <option value="fit">fit</option>
          </select>
        </label>

        <label class="field">
          <span>Dither</span>
          <select id="dither">
            <option value="ordered">ordered</option>
            <option value="none">none</option>
            <option value="floyd-steinberg">floyd-steinberg</option>
            <option value="atkinson">atkinson</option>
          </select>
        </label>

        <label class="field">
          <span>Alpha</span>
          <select id="alpha-mode">
            <option value="flatten">flatten</option>
            <option value="reserve-color0">reserve-color0</option>
          </select>
        </label>

        <label class="field">
          <span>BG Color</span>
          <input id="bg-color" type="color" value="#f4f1e8">
        </label>

        <label class="field">
          <span>Brightness</span>
          <input id="brightness" type="number" step="0.05" value="0">
        </label>

        <label class="field">
          <span>Contrast</span>
          <input id="contrast" type="number" step="0.05" value="0">
        </label>

        <label class="field">
          <span>Gamma</span>
          <input id="gamma" type="number" min="0.05" step="0.05" value="1">
        </label>

        <label class="field">
          <span>Preview Scale</span>
          <input id="preview-scale" type="number" min="1" value="6">
        </label>

        <label class="field strict-only">
          <span>Tile Size</span>
          <input id="tile-size" type="number" min="1" value="8">
        </label>

        <label class="field strict-only">
          <span>Colors/Tile</span>
          <input id="colors-per-tile" type="number" min="2" max="16" value="4">
        </label>

        <label class="field strict-only">
          <span>Max Palettes</span>
          <input id="max-palettes" type="number" min="1" max="16" value="8">
        </label>

        <label class="field checkbox">
          <span>Debug Sheet</span>
          <input id="debug" type="checkbox">
        </label>

        <button id="render">Render</button>
        <p id="status" class="status"></p>
      </section>

      <section class="panel result">
        <img id="preview" alt="Rendered output preview">
        <p id="links" class="links"></p>
      </section>

      <section class="panel history">
        <div class="history-head">
          <h2>Session History</h2>
          <button id="refresh-history" type="button">Refresh</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
